# APR Workflow Configuration
# Updated for Round 5 prompt

name: mycelium_spec
description: "Mycelium Agentic Knowledge Vault spec workflow"

documents:
  readme: "TARGET_VISION.md"
  spec: "SPEC.md"
  implementation: "CURRENT_STATE.md"

oracle:
  model: "5.2 Thinking"
  thinking_time: heavy

rounds:
  output_dir: ".apr/rounds/mycelium_spec"

template: |
  First, read this TARGET_VISION document (README slot):

  ```
  <contents of README will be included by oracle>
  ```

  ---

  Then read the current SPEC:

  ```
  <contents of spec will be included by oracle>
  ```

  ---

  And treat this CURRENT_STATE implementation/context document as canonical implementation state:

  ```
  <contents of implementation will be included by oracle>
  ```

  ---

  GLOBAL RULES (apply to this round):
  - Output ONLY the spec document (no commentary, no rationale, no meta).
  - Use normative language: MUST / SHOULD / MAY.
  - Every MUST requirement must have acceptance criteria (testable).
  - No repetition: consolidate; define each term once; use a Glossary.
  - If information is missing, write explicit TODO questions (do NOT handwave).
  - Do not invent repo-specific details not present in CURRENT_STATE.md.
  - Prefer structured lists/tables over long prose.

  ROUND 5 TASK (Acceptance Criteria + Test Plan + Spec Lint):
  Finalize the SPEC by making it testable, consistent, and free of fluff.

  ROUND 5 FOCUS:
  - Expand acceptance criteria into measurable checks per major feature.
  - Add a complete test plan:
    - unit/integration/e2e
    - golden test fixtures for ingestion + delta reports
    - regression tests for dedupe and idempotency
  - Add “Spec Lint” pass:
    - remove repetition
    - convert vague statements into MUST + acceptance criteria or TODO questions
    - ensure glossary covers all specialized terms
    - ensure every interface has inputs/outputs/errors

  OUTPUT REQUIREMENT:
  - Output ONLY the final SPEC.

