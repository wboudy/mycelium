# Golden Fixture: idempotency_changed_content
# Spec: §13.4 TST-G-001 — "same locator, different fingerprint"
# Version: 1
#
# Simulates re-ingestion of a source whose content has changed (different
# fingerprint) but at the same normalized_locator. The system must:
# - Reuse the same source_id (locator-based identity)
# - Record the revision lineage (prior_fingerprint is populated)
# - Produce a Delta Report reflecting the new claims vs existing vault

input:
  source_kind: url
  source_ref: "https://example.com/photosynthesis-overview"
  normalized_locator: "example.com/photosynthesis-overview"
  content: |
    Photosynthesis is the process by which green plants convert sunlight
    into chemical energy. New research has shown that some bacteria can
    also perform photosynthesis using infrared light, expanding our
    understanding of this fundamental biological process.
  fingerprint: "sha256:2cf24dba5fb0a30e26e83b2ac5b9e29e1b161e5c1fa7425e73043362938b9824"
  # Prior ingestion at same locator had a different fingerprint
  prior_fingerprint: "sha256:e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
  # Vault already contains claims from the prior ingestion
  existing_claims:
    - claim_id: "photosynthesis-energy--h-a1b2c3d4e5f6"
      claim_text: "Photosynthesis is the process by which green plants convert sunlight into chemical energy."

expected_output:
