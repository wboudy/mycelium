    fingerprint: "sha256:2cf24dba5fb0a30e26e83b2ac5b9e29e1b161e5c1fa7425e73043362938b9824"
    prior_fingerprint: "sha256:e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
  pipeline_status: completed
  counts:
    total_extracted_claims: 2
    exact_count: 1
    near_duplicate_count: 0
    supporting_count: 0
    contradicting_count: 0
    new_count: 1
  novelty_score: 0.5
  match_groups:
    EXACT:
      - extracted_claim_key: "h-a1b2c3d4e5f6"
        match_class: EXACT
        similarity: 1.0
        existing_claim_id: "photosynthesis-energy--h-a1b2c3d4e5f6"
    NEAR_DUPLICATE: []
    SUPPORTING: []
