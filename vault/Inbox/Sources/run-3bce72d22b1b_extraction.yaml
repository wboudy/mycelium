- extracted_claim_key: h-6e5c52b27048
  claim_text: Now, for prudent, most wise, and economic reasons, the blacksmith's
    shop was in the basement of his dwelling, but with a separate entrance to it;
    so that always had the young and loving healthy wife listened with no unhappy
    nervousness, but with vigorous pleasure, to the stout ringing of her young-armed
    old husband's hammer; whose reverberations, muffled by passing through the floors
    and walls, came up to her, not unsweetly, in her nursery; and so, to stout Labor's
    iron lullaby, the blacksmith's infants were rocked to slumber.
  claim_type: empirical
  polarity: opposes
